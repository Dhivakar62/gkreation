services:
  - type: web
    name: gkreation
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate --no-input && python manage.py create_superuser_safe"
    startCommand: "gunicorn GKCREATIONS.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        value: "z^^ld7t^li_5_tj4u5^hi+@9hcpe+5gn6%mzg*uq(ti)(g)4+x"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,gkreation.onrender.com"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_EMAIL
        value: "admin@gkreations.com"
      - key: ADMIN_PASSWORD
        sync: false
